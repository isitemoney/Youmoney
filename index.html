<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EranMoney </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap'); 
        body { font-family: 'Tajawal', sans-serif; overflow-x: hidden; } 
        .hidden { display: none !important; } 
        .pulse-loader { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen">

    <div id="redirect-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-6 text-center bg-[#020617] z-[9999] fixed inset-0">
        <div class="relative w-20 h-20 mb-8">
            <div class="absolute inset-0 rounded-full border-2 border-blue-500/10"></div>
            <div class="absolute inset-0 rounded-full border-2 border-t-blue-500 animate-spin"></div>
        </div>
        <h2 class="text-xl font-black text-white pulse-loader">جاري تحويلك الآن...</h2>
        <p class="text-blue-500/50 text-[9px] mt-3 font-bold tracking-[0.4em] uppercase">Secure Connection</p>
    </div>

    <nav id="nav" class="hidden bg-slate-900/40 backdrop-blur-md p-4 border-b border-white/5 flex justify-between items-center px-6 sticky top-0 z-50">
        <div class="flex flex-col text-right">
            <span class="text-lg font-bold text-blue-500 tracking-tighter">EranMoney</span>
            <span id="user-welcome" class="text-[10px] text-slate-500 italic font-bold">...</span>
        </div>
        <button onclick="logout()" class="bg-red-500/10 text-red-500 px-4 py-1 rounded-xl border border-red-500/20 text-xs font-bold">خروج</button>
    </nav>

    <div id="auth-section" class="hidden flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900/40 backdrop-blur-2xl p-12 rounded-[3rem] w-full max-w-md border border-white/5 shadow-2xl relative text-center">
            <div class="mb-10">
                <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-white tracking-tight">EranMoney</h2>
                <p class="text-slate-500 text-xs mt-2 italic text-blue-400">سجل دخولك وابدأ بجني الأرباح</p>
            </div>
            
            <button onclick="signInWithGoogle()" class="w-full bg-white text-black py-5 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 active:scale-95 shadow-xl">
                <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.48 10.92v3.28h7.84c-.24 1.84-.92 3.32-2.12 4.4-1.28 1.28-3.08 2.08-5.72 2.08-4.48 0-8.08-3.6-8.08-8.08s3.6-8.08 8.08-8.08c2.44 0 4.28.96 5.64 2.24l2.32-2.32C18.44 2.4 15.8 1.08 12.48 1.08 6.44 1.08 1.56 5.96 1.56 12s4.88 10.92 10.92 10.92c3.28 0 5.76-1.08 7.68-3.08 1.96-1.96 2.56-4.76 2.56-7.04 0-.48-.04-.96-.12-1.4h-10.12z"/></svg>
                <span class="text-base">الدخول عبر Google</span>
            </button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden p-4 max-w-6xl mx-auto space-y-6 mt-6 pb-20">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
            <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2.5rem]"><p class="text-slate-400 text-[11px] mb-1">الإجمالي</p><h3 id="stat-total" class="text-2xl font-bold text-white">$0.00</h3></div>
            <div class="bg-slate-900/40 border border-blue-500/20 p-6 rounded-[2.5rem]"><p class="text-blue-400 text-[11px] mb-1 font-bold">اليوم</p><h3 id="stat-today" class="text-2xl font-bold text-blue-400">$0.00</h3></div>
            <div class="bg-slate-900/40 border border-emerald-500/20 p-6 rounded-[2.5rem]"><p class="text-emerald-400 text-[11px] mb-1 font-bold underline">قابل للسحب</p><h3 id="stat-withdrawable" class="text-2xl font-bold text-emerald-400">$0.00</h3></div>
            <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2.5rem]"><p class="text-slate-400 text-[11px] mb-1">النقرات</p><h3 id="stat-clicks" class="text-2xl font-bold text-purple-400">0</h3></div>
        </div>

        <div class="bg-slate-900/40 border border-white/5 p-6 rounded-[2.5rem]">
            <h4 class="font-bold mb-3 text-[10px] text-slate-400 uppercase tracking-widest">🔗 رابط التسويق الخاص بك</h4>
            <div class="flex bg-[#020617] rounded-2xl overflow-hidden border border-white/5 p-1">
                <input type="text" id="ref-link" readonly class="bg-transparent p-3 flex-1 text-[11px] outline-none text-blue-300 text-left">
                <button onclick="copyRef()" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold transition shadow-lg shadow-blue-600/20">نسخ</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openWithdraw()" class="bg-emerald-600 p-5 rounded-[2rem] font-bold shadow-lg text-white active:scale-95">💰 طلب سحب</button>
            <a href="https://t.me/eruuiyl" target="_blank" class="bg-slate-800/40 p-5 rounded-[2rem] font-bold border border-white/5 text-center flex items-center justify-center active:scale-95">💬 الدعم</a>
        </div>

        <div id="withdraw-modal" class="hidden bg-slate-900 p-8 rounded-[3rem] border border-emerald-500/20 space-y-4 shadow-2xl">
            <h3 class="text-xl font-bold text-emerald-400 text-center mb-4">سحب الأرباح</h3>
            <div class="space-y-4 text-right">
                <select id="w-method" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm">
                    <option value="ZainCash">Zain Cash - زين كاش</option>
                    <option value="USDT">USDT (TRC20)</option>
                    <option value="AsiaCell">Asiacell - رصيد آسيا</option>
                </select>
                <input type="text" id="w-account" placeholder="رقم المحفظة" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                <input type="number" id="w-amount" placeholder="المبلغ (7$ أدنى)" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                <input type="text" id="w-contact" placeholder="تليجرام للتواصل" class="w-full p-4 rounded-2xl bg-[#020617] border border-white/5 outline-none text-white text-sm text-right">
                <button onclick="confirmWithdraw()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">تأكيد السحب</button>
                <button onclick="openWithdraw()" class="w-full text-slate-500 text-sm">إلغاء</button>
            </div>
        </div>

        <div id="admin-area" class="hidden space-y-8 mt-10 border-t border-white/5 pt-10 text-right">
            <div class="bg-red-900/5 border border-red-500/20 p-6 rounded-[2.5rem]">
                <h2 class="text-red-400 font-bold mb-4 italic underline">⚙️ طلبات السحب (أدمن)</h2>
                <div id="withdraw-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="toast-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[11px] font-bold px-6 py-2 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-[999]">
        تــم نسخ رابطك التسويقي بنجاح
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCnkJf-6sAeRJpm34yXLmklLwSxM-GJvUc",
            authDomain: "my-dash-c78e3.firebaseapp.com",
            databaseURL: "https://my-dash-c78e3-default-rtdb.firebaseio.com",
            projectId: "my-dash-c78e3",
            storageBucket: "my-dash-c78e3.firebasestorage.app",
            messagingSenderId: "137154835768",
            appId: "1:137154835768:web:7f396782de1300f9bdfdcd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        
        const ADMIN_EMAILS = ["xxetali46@gmail.com", "xxetali47@gmail.com"];
        const DEFAULT_MARKETING_LINK = "https://hp.funroom.store/a/8nw6emt2";
        let currentWithdrawable = 0;

        async function signInWithGoogle() {
            try {
                await auth.signInWithRedirect(googleProvider);
            } catch (e) { alert("خطأ: " + e.message); }
        }

        // استلام نتيجة جوجل بعد العودة للموقع
        auth.getRedirectResult().then(async (res) => {
            if (res.user) {
                const user = res.user;
                const userRef = db.ref('users/' + user.uid);
                const snap = await userRef.get();
                if (!snap.exists()) {
                    await userRef.set({
                        username: user.displayName || "مروج جديد",
                        email: user.email,
                        totalBalance: 0, todayBalance: 0, withdrawableBalance: 0, clicks: 0, marketingLink: DEFAULT_MARKETING_LINK, joinDate: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            }
        }).catch((e) => console.error(e));

        async function handleVisitor(id) {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const vIp = ipData.ip.replace(/\./g, '_'); 
                const ipRef = db.ref('ip_logs/' + id + '/' + vIp);
                const userRef = db.ref('users/' + id);
                const ipSnap = await ipRef.get();
                const now = Date.now();

                if (ipSnap.exists() && (now - ipSnap.val() < 86400000)) { 
                    finalizeRedirect(userRef); 
                } else {
                    await ipRef.set(now);
                    await userRef.transaction(d => {
                        if (d) {
                            d.clicks = (d.clicks || 0) + 1;
                            d.todayBalance = Number(((d.todayBalance || 0) + 0.02).toFixed(2));
                            d.totalBalance = Number(((d.totalBalance || 0) + 0.02).toFixed(2));
                        }
                        return d;
                    });
                    finalizeRedirect(userRef);
                }
            } catch (e) { window.location.href = DEFAULT_MARKETING_LINK; }
        }

        function finalizeRedirect(ref) {
            ref.get().then(snap => {
                const link = (snap.val() && snap.val().marketingLink) ? snap.val().marketingLink : DEFAULT_MARKETING_LINK;
                setTimeout(() => { window.location.href = link; }, 400);
            });
        }

        function checkRoute() {
            const pId = new URLSearchParams(window.location.search).get('id');
            if (pId) { 
                document.getElementById('redirect-screen').classList.remove('hidden'); 
                handleVisitor(pId); 
            } else { 
                auth.onAuthStateChanged(user => {
                    if (user) {
                        showUI('dashboard-section'); 
                        loadUserData(user); 
                        if (ADMIN_EMAILS.includes(user.email)) { 
                            document.getElementById('admin-area').classList.remove('hidden'); 
                            loadAdminData(); 
                        }
                    } else { showUI('auth-section'); }
                });
            }
        }

        function loadUserData(user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val(); if(!d) return;
                document.getElementById('stat-total').innerText = `$${(d.totalBalance || 0).toFixed(2)}`;
                document.getElementById('stat-today').innerText = `$${(d.todayBalance || 0).toFixed(2)}`;
                document.getElementById('stat-withdrawable').innerText = `$${(d.withdrawableBalance || 0).toFixed(2)}`;
                document.getElementById('stat-clicks').innerText = d.clicks || 0;
                document.getElementById('user-welcome').innerText = `أهلاً، ${d.username}`;
                document.getElementById('ref-link').value = "https://isitemoney.github.io/Sitelinkmoney/?id=" + user.uid;
                currentWithdrawable = d.withdrawableBalance || 0;
            });
        }

        function copyRef() {
            const el = document.getElementById('ref-link'); el.select(); document.execCommand('copy');
            const toast = document.getElementById('toast-msg'); toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        function confirmWithdraw() {
            const amount = parseFloat(document.getElementById('w-amount').value);
            if (isNaN(amount) || amount < 7 || amount > currentWithdrawable) return alert("رصيد غير كافٍ.");
            db.ref('users/' + auth.currentUser.uid).transaction(d => {
                if (d && (d.withdrawableBalance || 0) >= amount) { d.withdrawableBalance = Number((d.withdrawableBalance - amount).toFixed(2)); return d; }
            }, (err, comm) => {
                if (comm) {
                    db.ref('withdrawals').push({ 
                        uid: auth.currentUser.uid, amount, 
                        method: document.getElementById('w-method').value,
                        account: document.getElementById('w-account').value,
                        contact: document.getElementById('w-contact').value,
                        status: 'pending', timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                    alert("تم طلب السحب."); openWithdraw();
                }
            });
        }

        function loadAdminData() {
            db.ref('withdrawals').on('value', snap => {
                const list = document.getElementById('withdraw-list'); list.innerHTML = "";
                const data = snap.val(); if(!data) return;
                for (let id in data) {
                    if(data[id].status === 'paid') continue;
                    list.innerHTML += `<div class="bg-[#020617] p-5 rounded-2xl border-r-4 border-amber-500 mb-3 text-right">
                        <div class="flex justify-between items-center">
                            <button onclick="db.ref('withdrawals/${id}').update({status: 'paid'})" class="bg-emerald-600 px-4 py-1 rounded-xl text-[10px] font-bold">دفع</button>
                            <p class="font-bold text-white">$${data[id].amount}</p>
                        </div>
                        <p class="text-slate-500 text-[10px] mt-2">الحساب: ${data[id].account}</p>
                    </div>`;
                }
            });
        }

        function showUI(id) {
            document.querySelectorAll('#auth-section, #dashboard-section, #nav').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'dashboard-section') document.getElementById('nav').classList.remove('hidden');
        }
        function openWithdraw() { document.getElementById('withdraw-modal').classList.toggle('hidden'); }
        function logout() { auth.signOut(); }
        checkRoute();
    </script>
</body>
</html>
